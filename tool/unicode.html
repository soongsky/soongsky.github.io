<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Unicode码位测试</title>
<style>
main, aside, section {
	display: block; 
	overflow: auto;
}

aside {
	width: 20em;
	float: left;
}

th {
	width: 1em;
	background-color: lightgray;
}
</style>
<script>
"use strict";
function menu(ucs){
	var node = document.currentScript.parentNode;
	for (var i=0; i<ucs.length; ++i) {
		var a = document.createElement("a");
		node.appendChild(a);
		var range = "（U+" + ucs[i][1].toString(16).toUpperCase() + "~" + ucs[i][2].toString(16).toUpperCase() + "）";
		a.href = "javascript:show('" + ucs[i][0] + range + "'," + ucs[i][1] + "," + ucs[i][2] + ")";
		if (ucs[i][3]) a.style.fontWeight = "bold";
		a.innerHTML = ucs[i][0];
		node.innerHTML += range + "<br />";
	}
}

function show(title, lower, upper){
	var uni = document.getElementById("uni");
	uni.innerHTML = "<h1>" + title + "</h1>";
	var table = document.createElement("table");
	uni.appendChild(table);
	var row = document.createElement("tr");
	table.appendChild(row);
	var cell = document.createElement("th");
	row.appendChild(cell);
	cell.innerHTML = "&nbsp;"
	for (var j=0; j<16; ++j) {
		cell = document.createElement("th");
		row.appendChild(cell);
		cell.innerHTML = j.toString(16).toUpperCase();
	}
	var ucs = (lower & ~0x0F);
	for (var i=0; i<(upper>>4)-(lower>>4)+1; ++i) {
		row = document.createElement("tr");
		table.appendChild(row);
		cell = document.createElement("th");
		row.appendChild(cell);
		cell.innerHTML = ucs.toString(16).toUpperCase();
		for (j=0; j<16; ++j) {
			var ch = String.fromCodePoint(ucs);
			cell = document.createElement("td");
			row.appendChild(cell);
			if (lower <= ucs && ucs <= upper) {
				var a = document.createElement("a");
				cell.appendChild(a);
				a.href = "http://zi.tools/zi/" + ch;
				a.target = "_blank";
				a.innerHTML = ch;
			} else cell.innerHTML = "&nbsp;";
			++ucs;
		}
	}
	uni.innerHTML += "<a href='#'>页首</a>";
}
</script>
</head>
