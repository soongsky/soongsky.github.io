<script>
"use strict";
// 1582年10月4日的儒略日，儒略历的最后一日，次日即改为格里历1582年10月15日
var JD1582_10_4 = 2299160;
// 儒略历4年周期天数
var J4Y = (365 * 4 + 1);
// 格里历400年周期天数
var G4C = ((365 * 4 + 1) * 100 - 3);
// 格里历（逢3200年不置闰）3200年周期天数
var G32C = (((365 * 4 + 1) * 100 - 3) * 8 - 1);
// 儒略日与玛雅日之差（此值有争论）
var JD_MAYA = 584283;
// 玛雅长计历周期天数
var MYLC = (20 * 20 * 20 * 18 * 20);
// 日历类型
var AUTO =0;
var JULIAN =1;
var GREGORIAN = 2;
var GREGORIAN_3200 = 3;
// 卓尔金历（Tzolk'in）日名，1-基
var TNAME = ["", "Imix'", "Ik'", "Ak'b'al", "K'an", "Chikchan", "Kimi", "Manik'", "Lamat", "Muluk", "Ok",
	"Chuwen", "Eb'", "B'en", "Ix", "Men", "K'ib'", "Kab'an", "Etz'nab'", "Kawak", "Ajaw"];
// 哈布历（Haab'）月名，1-基
var HBM = ["", "Pop", "Wo'", "Sip", "Sotz'", "Sek", "Xul", "Yaxk'in", "Mol", "Ch'en", "Yax",
	"Sak'", "Keh", "Mak", "K'ank'in", "Muwan'", "Pax", "K'ayab'", "Kumk'u", "Wayeb'"];
// 天干地支名，0-基
var TG = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
var DZ = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
// 星期名，周日序号为0，周六序号为6
var WK = ["日", "一", "二", "三", "四", "五", "六"];

	clku.onclick = function(){update_now(time, 0)};

/*

	var sclk = document.getElementById("sclk");

	var clock = function(){
		// 本机时间
		var d = new Date();
		time = d.getTime();
		var y = d.getFullYear();
		// 当前时区，分钟差
		tzn = -d.getTimezoneOffset();
		// 非夏令时区，分钟差；考虑南半球夏令时情况
		tzr = Math.min(-new Date(y, 0).getTimezoneOffset(), -new Date(y, 6).getTimezoneOffset());
		update_clk(clkn, clkr, clku, d, tzn, tzr);

/*

function update_clk(clkn, clkr, clku, d, tzn, tzr){
	var hr = d.getHours();
	var mn = d.getMinutes();
	var sc = d.getSeconds();

	clkn.value = ts(hr, mn, sc) + " UTC" + tzs(tzn);
	if (tzn != tzr) clkn.value += "夏";

	// 当前是夏令时
	if (tzr != tzn) {
		mn -= tzn - tzr;
		while (mn < 0) {
			mn += 60;
			if (--hr < 0) hr += 24;
		}
		clkr.value = ts(hr, mn, sc) + " UTC" + tzs(tzr);
		clkr.hidden = false;
	} else clkr.hidden = true;

	// 当前非UTC+0时区
	if (tzn && tzr) {
		hr = d.getUTCHours();
		mn = d.getUTCMinutes();
		sc = d.getUTCSeconds();
		clku.value = ts(hr, mn, sc) + " UTC";
		clku.hidden = false;
	} else clku.hidden = true;
}

function ts(hr, mn, sc){
	if (hr < 10) hr = "0" + hr;
	if (mn < 10) mn = "0" + mn;
	if (sc < 10) sc = "0" + sc;
	return hr + ":" + mn + ":" + sc;
}

function tzs(tz){
	var tzm = tz % 60;
	var tzh = (tz - tzm) / 60;
	var str = "";
	if (tz > 0) {
		if (tzh < 10) tzh = "0" + tzh;
		str = "+" + tzh;
	} else if (tz < 0) {
		tzh = -tzh;
		if (tzh < 10) tzh = "0" + tzh;
		str = "-" + tzh;
		tzm = -tzm;
	}
	if (tzm) str += ":" + tzm;
	return str;
}

function update(jd, tz){
	if (isNaN(jd)) return;
	document.getElementById("jd").value = jd;

	var t = jdtot(jd, tz);
	document.getElementById("hr").selectedIndex = t.hr;
	document.getElementById("mn").selectedIndex = t.mn;
	document.getElementById("sc").selectedIndex = t.sc;

	var wk = jdtow(t.jdn);
	var gz = jdtogz(t.jdn);
	document.getElementById("dgz").innerHTML = "周" + WK[wk] + " " + TG[gz%10] + DZ[gz%12] + "(" + (gz+1) + ")";

	update_c(t.jdn, "cm", AUTO);
	update_c(t.jdn, "gg", GREGORIAN);
	update_c(t.jdn, "jl", JULIAN);
	update_c(t.jdn, "g32", GREGORIAN_3200);
	document.getElementById("ggl").style.fontWeight = t.jdn>JD1582_10_4 ? "bold" : "normal";
	document.getElementById("jll").style.fontWeight = t.jdn>JD1582_10_4 ? "normal" : "bold";

	var m = jdtomaya(t.jdn);
	document.getElementById("mp").value = m.pre;
	document.getElementById("mhy").selectedIndex = m.hy;
	document.getElementById("mty").selectedIndex = m.ty;
	document.getElementById("my").selectedIndex = m.y;
	document.getElementById("mm").selectedIndex = m.m;
	document.getElementById("md").selectedIndex = m.d;
	document.getElementById("tk").innerHTML = "卓尔金历：" + m.tnum + " " + TNAME[m.tname] + "(" + m.tname + ")";
	document.getElementById("hb").innerHTML = "哈布历：" + m.hbd + " " + HBM[m.hbm] + "(" + m.hbm + ")";
}

function update_c(jdn, id, type){
	var form = document.getElementById(id);
	var elem = form.elements;

	var d = jdtod(jdn, type);
	var y = d.y;
	if (y > 0) {
		elem.namedItem("era").selectedIndex = 0;
	} else {
		y = 1 - y;
		elem.namedItem("era").selectedIndex = 1;
	}
	elem.namedItem("y").value = y;
	elem.namedItem("m").selectedIndex = d.m-1;
	elem.namedItem("d").selectedIndex = d.d-1;

	if (id !="cm") return;
	
	var gz = ytogz(d.y);
	document.getElementById("ygz").innerHTML = "岁次" + TG[gz%10] + DZ[gz%12] + "(" + (gz+1) + ")";
	// 月历
	var cmc = document.getElementById("cmc");
	cmc.innerHTML = "";

	// 上月首
	var jd0 = dtojd(d.y, d.m-1, 1, type);
	// 本月首
	var jd1 = dtojd(d.y, d.m, 1, type);
	// 下月首
	var jd2 = dtojd(d.y, d.m+1, 1, type);
	// 上月末日序号
	var n0 = jd1 - jd0;
	// 本月末日序号
	var n1 = jd2 - jd1;
	// 月首偏移
	var delta = jdtow(jd1);
	// 日历行数
	var ln = (n1+delta)/7+1;
	// 改历修正
	if (n0 < 28) n0 += 10;
	else if (n1 < 28) n1 += 10;

	// 周起始日序号
	var k = 1 - delta;
	// 周起始儒略日
	var jdk = jd1 - delta;
	// 周起始干支
	var gzk = jdtogz(jdk);
	for (var i=0; i<ln; ++i) {
		var row = document.createElement("tr");
		cmc.appendChild(row);
		for (var j=0; j<7; ++j) {
			var cell = document.createElement(i ? "td" : "th");
			row.appendChild(cell);
			if (j == 0) cell.className = "sunday";
			else if (j == 6) cell.className = "saturday";
			if (i == 0) {
				cell.innerHTML = WK[j];
				continue;
			}
			if (jdk == jdn) cell.classList.add("today");
			if (k <= 0) {
				cell.classList.add("other");
				cell.innerHTML = "<div>" + (k + n0) + "</div>";
			} else if (k > n1){
				cell.classList.add("other");
				cell.innerHTML = "<div>" + (k - n1) + "</div>";
			} else {
				cell.innerHTML = "<div class='day'>" + k + "</div>";
			}
			// 改历修正
			if (jdk==JD1582_10_4) k += 11;
			else ++k;
			++jdk;
			cell.innerHTML += "<div class='dgz'>" + TG[gzk%10] + DZ[gzk%12] + "</div>";
			++gzk;
		}
	}
}

function update_now(time, tz){
	var jd = dtojd(1970, 1, 1, GREGORIAN) + ttojd(0, 0, time/1000, 0);
	update(jd, tz);

	// 选时区
	var tzs = document.getElementById("tz");
	for (var i=0; i<tzs.length; ++i) {
		if (tzs.options[i].value == tz) break;
	}
	// 新增时区
	if (i >= tzs.length) {
		var option = document.createElement("option");
		tzs.appendChild(option);
		option.value = tz;
		option.text = tzs(tz);
	}
	tzs.selectedIndex = i;
}

function update_jd(){
	var tz = parseInt(document.getElementById("tz").value);
	var jd = parseFloat(document.getElementById("jd").value);
	update(jd, tz);
}

function get_t(){
	var hr = document.getElementById("hr").selectedIndex;
	var mn = document.getElementById("mn").selectedIndex;
	var sc = document.getElementById("sc").selectedIndex;
	var tz = parseInt(document.getElementById("tz").value);
	return {jd: ttojd(hr, mn, sc, tz), tz:tz};
}

function update_d(form){
	var id = form.id;
	var type;
	if (id == "gg") type = GREGORIAN;
	else if (id == "jl") type = JULIAN;
	else if (id == "g32") type = GREGORIAN_3200;
	else type = AUTO;

	var elem = form.elements;
	var y = parseInt(elem.namedItem("y").value);
	var m = elem.namedItem("m").selectedIndex+1;
	var d = elem.namedItem("d").selectedIndex+1;
	if (elem.namedItem("era").selectedIndex) y=1-y;

	var t = get_t();
	update(dtojd(y, m, d, type)+t.jd, t.tz);
}

function update_maya(){
	var tz = parseInt(document.getElementById("tz").value);
	var pre = parseInt(document.getElementById("mp").value);
	var hy = document.getElementById("mhy").selectedIndex;
	var ty = document.getElementById("mty").selectedIndex;
	var y = document.getElementById("my").selectedIndex;
	var m = document.getElementById("mm").selectedIndex;
	var d = document.getElementById("md").selectedIndex;

	var t = get_t();
	update(mayatojd(pre, hy, ty, y, m, d)+t.jd, t.tz);
}

// 儒略日数转换为日期
function jdtod(jdn, type){
	var y, m, d;
	if (type == AUTO) type = (jdn <= JD1582_10_4) ? JULIAN : GREGORIAN;
	// 儒略日以-4712年1月1日起算，为方便计算置闰年份，转换为以0年3月1日起算：
	d = jdn - (365*4712+4712/4+31+29);
	// 如果是格里历
	if (type != JULIAN) {
		// 格里历1582年10月15日是儒略历1582年10月4日的次日，两者在0年3月1日的儒略日数之差为：2
		d -= 2;
		// 格里历（逢3200年不置闰）修正
		if (type == GREGORIAN_3200) d += Math.floor(d / G32C);
		// 0年3月1日起算的400年周期数
		var ny = Math.floor(d / G4C);
		// 当前400年周期内的剩余天数
		d -= G4C * ny;
		y = 400 * ny;
		// 格里历逢100年不置闰、逢400年置1闰，修正与儒略历的闰日数之差
		d += Math.floor((4 * d + 3) / G4C);
	// 否则是儒略历
	} else {
		// 0年3月1日起算的4年周期数
		var ny = Math.floor(d / J4Y);
		// 当前4年周期内的剩余天数
		d -= J4Y * ny;
		y = 4 * ny;
	}
	// 当前周期内的年数
	var dy = Math.floor((4 * d + 3) / J4Y);
	// 当年3月1日起算的剩余天数
	d -= 365 * dy + Math.floor(dy / 4);
	// 日历年份
	y += dy;
	// 日历月份
	m = Math.floor((5 * d + 2) / 153) + 3;
	// 日历日期
	d -= Math.floor((153 * m + 3) / 5) - 93;
	// 修正1、2月份
	if (m > 12) {
		m -= 12;
		++y;
	}
	return {y: y, m: m, d: d};
}

// 日期转换为儒略日数
function dtojd(y, m, d, type){
	// 将1、2月份算作上一年的13、14月份
	if (m <= 2) {
		--y;
		m += 12;
	}
	// 先按儒略历计算儒略日数
	d += (365*4712+4712/4-33) + 365 * y + Math.floor(y / 4) + Math.floor((153 * m + 3) / 5);
	if (type == AUTO)  type = (d <= JD1582_10_4) ? JULIAN : GREGORIAN;
	// 如果是格里历
	if (type != JULIAN) {
		// 修正格里历与儒略历的儒略日数之差
		d += 2 - Math.floor(y / 100) + Math.floor(y / 400);
		// 格里历（逢3200年不置闰）修正
		if (type == GREGORIAN_3200) d -= Math.floor(y / 3200);
	}
	return d;
}

// 儒略日转换为时间
function jdtot(jd, tz){
	// 儒略日以12:00 UTC起算，转换为以当地时间0:00起算
	jd += (12 + tz / 60) / 24;
	// 取整数部分
	var jdn = Math.floor(jd);
	// 小数部分转换为时间
	jd -= jdn;

	// 日内秒数
	var t = Math.round(jd * 86400);
	if (t >= 86400) {
		t -= 86400;
		++jdn;
	}
	// 秒
	var s = t % 60;
	t = (t - s) / 60;
	// 分
	var m = t % 60;
	// 时
	var h = (t - m) / 60;
	return {jdn: jdn, hr: h, mn: m, sc: s};
}

// 时间转换为儒略日
function ttojd(h, m, s, tz){
	// 时间转换为儒略日，并转换为以12:00 UTC起算
	return (h - 12 + (m - tz + s / 60) / 60) / 24;
}

// 儒略日数转换为玛雅历日期
function jdtomaya(jdn){
	// 转换为玛雅历起算的天数
	var maya = jdn - JD_MAYA;

	// 长计历的循环数
	var pre = Math.floor(maya / MYLC);
	// 循环内的剩余天数
	var t = maya - MYLC * pre;
	// 日（K'in）
	var d = t % 20;
	t = (t - d) / 20;
	// 月（Winal）
	var m = t % 18;
	t = (t - m) / 18;
	// 年（Tun）
	var y = t % 20;
	t = (t - y) / 20;
	// 廿年（K'atun）
	var ty = t % 20;
	// 四百年（B'ak'tun）
	var hy = (t - ty) / 20;

	// 玛雅历起算日的卓尔金历为：4 Ajaw（4-20）
	var tnum = (maya + 4) % 13;
	if (tnum <= 0) tnum += 13;
	var tname = (maya + 20) % 20;
	if (tname <= 0) tname += 20;

	// 玛雅历起算日的哈布历为：8 Kumk'u（8/18）
	var hbd = (maya + (8+20*(18-1))) % 365;
	if (hbd < 0) hbd += 365;
	var hbm = Math.floor(hbd / 20);
	hbd -= hbm++ * 20;

	return {pre:pre, hy:hy, ty:ty, y:y, m:m, d:d, tnum:tnum, tname:tname, hbd:hbd, hbm:hbm};
}

// 玛雅历长计历转换为儒略日数
function mayatojd(pre, hy, ty, y, m, d){
	return ((((pre * 20 + hy) * 20 + ty) * 20 + y) * 18 + m) * 20 + d + JD_MAYA;
}
// 儒略日数转换为星期序号
function jdtow(jdn){
	// 儒略日起算日-4712年1月1日为：周一
	var week = (jdn + 1) % 7;
	// 修正负数
	return (week < 0) ? (week + 7) : week;
}

// 儒略日数转换为干支序号
function jdtogz(jdn){
	// 儒略日的起算日-4712年年1月1日的干支为：癸丑
	var gz = (jdn + (9*6-1*5)) % 60;
	// 修正负数
	return (gz < 0) ? (gz + 60) : gz;
}

// 年份转换为干支序号
function ytogz(y){
	// 公元1024年干支为：甲子
	var gz = (y - 1024) % 60;
	// 修正负数
	return (gz < 0) ? (gz + 60) : gz;
}
